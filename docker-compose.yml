version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: yoedu-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: yoedu
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: yoedu-adminer
    restart: always
    ports:
      - '8082:8080'

volumes:
  postgres_data:
